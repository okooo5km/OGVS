version: 2

project_name: ogvs

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/ogvs
    binary: ogvs
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  abbrev: -1
  groups:
    - title: "🚀 Features"
      regexp: '^.*?feat(\([^)]*\))?!?:.*$'
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: '^.*?fix(\([^)]*\))?!?:.*$'
      order: 1
    - title: "⚡ Performance"
      regexp: '^.*?perf(\([^)]*\))?!?:.*$'
      order: 2
    - title: "♻️ Refactor"
      regexp: '^.*?refactor(\([^)]*\))?!?:.*$'
      order: 3
    - title: "📦 Build & CI"
      regexp: '^.*?(build|ci)(\([^)]*\))?!?:.*$'
      order: 4
    - title: "🧹 Others"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^Merge"

brews:
  - repository:
      owner: okooo5km
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    name: ogvs
    homepage: "https://github.com/okooo5km/ogvs"
    description: "Go implementation of SVGO — the SVG optimizer"
    license: "MIT"
    install: |
      bin.install "ogvs"
    test: |
      system bin/"ogvs", "--version"

release:
  github:
    owner: okooo5km
    name: ogvs
  name_template: "OGVS v{{ .Version }}"
  header: |
    ## OGVS v{{ .Version }}

    [Full Changelog](https://github.com/okooo5km/ogvs/compare/{{ .PreviousTag }}...{{ .Tag }})
  footer: |
    ---
    **Installation:** `brew install okooo5km/tap/ogvs` or `go install github.com/okooo5km/ogvs/cmd/ogvs@{{ .Tag }}`
